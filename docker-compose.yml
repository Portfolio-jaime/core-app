# ─── DEV: hot-reload local ────────────────────────────────────────────────────
# Usage: docker compose up [--build]
#
# The node:20-alpine image is used directly; source code is mounted so Next.js
# can hot-reload changes without rebuilding the image.
# Named volumes isolate node_modules and .next from the host filesystem.

services:
  frontend:
    image: node:20-alpine
    container_name: healthos-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      # Isolate installed deps so host node_modules don't shadow container ones
      - frontend_node_modules:/app/node_modules
      # Isolate Next.js build cache to avoid conflicts with host .next
      - frontend_next_cache:/app/apps/frontend/.next
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      # Required for file-watch polling inside Docker on macOS
      - WATCHPACK_POLLING=true
    # Install deps on first run (cached in named volume) then start dev server
    command: >
      sh -c "npm ci --prefer-offline && npm run dev:frontend"

volumes:
  frontend_node_modules:
  frontend_next_cache:
