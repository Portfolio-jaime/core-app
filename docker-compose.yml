# ─── DEV: hot-reload local ────────────────────────────────────────────────────
# Usage: docker compose up [--build]
#
# Three services: postgres → api (NestJS) → frontend (Next.js)
# Source code is bind-mounted so changes hot-reload without rebuilding images.
# Named volumes isolate each service's node_modules from the host.

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: healthos-postgres
    environment:
      POSTGRES_DB: healthos
      POSTGRES_USER: healthos
      POSTGRES_PASSWORD: healthos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthos -d healthos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS API ─────────────────────────────────────────────────────────────
  api:
    # node:20 (debian) avoids Alpine/OpenSSL compatibility issues with Prisma 5
    image: node:20
    container_name: healthos-api-dev
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
    # Install deps (cached in volume), generate Prisma client, run migrations, start with watch
    command: >
      sh -c "npm install --prefer-offline --legacy-peer-deps &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npm run start:dev"

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: healthos-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/apps/frontend/.next
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    command: >
      sh -c "npm install --legacy-peer-deps && npm run dev:frontend"

volumes:
  postgres_data:
  api_node_modules:
  frontend_node_modules:
  frontend_next_cache:

