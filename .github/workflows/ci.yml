name: CI — Build, Test & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USER: jaimehenao8126
  API_IMAGE: jaimehenao8126/healthos-api
  FRONTEND_IMAGE: jaimehenao8126/healthos-frontend

jobs:
  # ── 1. TEST API ─────────────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit

  # ── 2. BUILD & PUSH API ─────────────────────────────────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. BUILD & PUSH FRONTEND ─────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. UPDATE K8S MANIFESTS (GitOps — triggers ArgoCD) ──────────────────────
  update-manifests:
    name: Update K8s image tags
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update API image tag in manifest
        run: |
          sed -i "s|image: ${{ env.API_IMAGE }}:.*|image: ${{ env.API_IMAGE }}:${{ github.sha }}|" \
            k8s/base/api-deployment.yaml

      - name: Update Frontend image tag in manifest
        run: |
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|" \
            k8s/base/frontend-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/api-deployment.yaml k8s/base/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update images to ${{ github.sha }} [skip ci]"
          git push
