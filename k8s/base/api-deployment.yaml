apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: healthos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: jaimehenao8126/healthos-api:24b48730d917b0bf0225c4528937e84a7d023b2e
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: healthos-config
            - secretRef:
                name: healthos-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: healthos
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
