# Kind cluster config — shared local-dev cluster
# Canonical version: /Users/jaime.henao/arheanja/dev-cluster/kind-cluster.yaml
# Apps: healthos (core-app), bills (bills-app)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
